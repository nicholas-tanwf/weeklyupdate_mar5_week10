<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChronoAI Vibe-Coding Hackathon — Full Proposal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--card:#111;--border:rgba(255,255,255,.08);--g2:#86868b;--blue:#0071e3;--green:#30d158;--teal:#64d2ff;--orange:#ff9f0a;--purple:#bf5af2;--pink:#ff375f}
body{font-family:'Inter',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;background:var(--bg);color:#fff;line-height:1.6;padding:0}
.hero{padding:80px 24px 60px;text-align:center;max-width:800px;margin:0 auto}
.hero-tag{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);margin-bottom:16px}
.hero h1{font-size:clamp(36px,6vw,64px);font-weight:900;line-height:1.06;letter-spacing:-.04em;margin-bottom:16px}
.hero h1 span{background:linear-gradient(90deg,var(--blue),var(--teal),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:18px;color:var(--g2);max-width:600px;margin:0 auto}
.content{max-width:800px;margin:0 auto;padding:0 24px 80px}
.section{margin-bottom:48px}
.section-tag{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.section h2{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:16px}
.section p{font-size:16px;color:rgba(255,255,255,.6);line-height:1.7;margin-bottom:12px}
.section p strong{color:#fff}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px}
.stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{flex:1;min-width:120px;text-align:center;padding:20px 12px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px}
.stat strong{font-size:32px;font-weight:900;display:block;letter-spacing:-.02em}
.stat span{font-size:12px;color:var(--g2)}
.back-link{position:fixed;top:24px;left:24px;padding:8px 16px;border-radius:100px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:13px;font-weight:600;text-decoration:none;transition:all .2s;z-index:100}
.back-link:hover{background:rgba(255,255,255,.12);color:#fff}
.placeholder{padding:40px;text-align:center;border:2px dashed rgba(255,255,255,.1);border-radius:16px;color:var(--g2);font-size:15px}
</style>
</head>
<body>

<a href="./index.html" class="back-link">← Back to Slides</a>

<div class="hero">
  <div class="hero-tag">Full Proposal</div>
  <h1>ChronoAI <span>Vibe-Coding Hackathon</span></h1>
  <p>A comprehensive proposal for ChronoAI's first community hackathon — strategy, logistics, partners, budget, and success metrics.</p>
</div>

<div class="content">

  <div class="placeholder">
    This document is being built. Content coming soon.
  </div>

</div>

</body>
</html>
